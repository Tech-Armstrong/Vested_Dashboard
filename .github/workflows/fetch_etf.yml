name: Fetch ETF Data

on:
  schedule:
    # Runs at 21:30 UTC = 3:00 AM IST (after US market close at 4 PM EST)
    - cron: "30 21 * * 1-5"   # Mon–Fri only
  workflow_dispatch:           # Allow manual trigger from GitHub UI

permissions:
  contents: write              # Needed to commit data back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full history so git commit works cleanly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run fetch script
        run: python scripts/fetch_etf_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/etf_data.json docs/data/etf_history.json
          git diff --cached --quiet || git commit -m "chore: update ETF data $(date -u +%Y-%m-%d)"
          git push
